<!DOCTYPE html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>服务器插件列表</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <form>
        <a></a>
        <div id="plugins">

        </div>
        <time id="time"></time>
        <script src="/js/crypto-js.js"></script>
        <script src="/js/AES.js"></script>
        <script src="/js/VanCraftPlugins.js"></script>
        <script src="/js/PlayerLogin.js"></script>
        <script src="/js/ReadVaule.js"></script>
        <script src="/js/cookie.js"></script>
        <script src="/js/clock_jump.js"></script>
        <script src="/js/random.js"></script>
        <script type="text/javascript">
            UserToken = ReadCookie('UserToken')
            if(UserToken != ''){
                playerlogin = PlayerLogin('UserToken',UserToken)
                if(!playerlogin[0]){
                    document.getElementById("plugins").innerHTML = '<PlayerLogin style="color:white;background:#FF0000">登录失败，请重新登录</PlayerLogin><br><PlayerLogin style="color:white;background:#FF00FF">登录失败原因: ' + playerlogin[1] + '</PlayerLogin><br>';
                    clock('/PlayerLogin',5)
                }else{
                    ShowVanCraftPlugins(playerlogin[2],playerlogin[3])
                }
            }else{
                document.getElementById("plugins").innerHTML = '<PlayerLogin style="color:white;background:#FF0000">登录失败，请重新登录</PlayerLogin><br><PlayerLogin style="color:white;background:#FF00FF">登录失败原因: ' + '你可能没有登录过或登录保存数据过期或已被清除' + '</PlayerLogin><br>';
                        clock('/PlayerLogin',5)
                } 
        </script>
    </form>
</body>
