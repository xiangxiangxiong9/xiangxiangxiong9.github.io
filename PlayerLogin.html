<!DOCTYPE html>
<head>
    <title>登录页面</title>
    <link href="style.css" rel="stylesheet" type="text/css" />

<body>
    <form>
        <a></a>
        <div id="login">

        </div>
        <div>

onkeydown="if(event.keyCode==13)event.keyCode=9" -->
        </div>
        <div>

        <script type="text/javascript">
            UserToken = ReadCookie('UserToken');
            if(UserToken != ''){
                playerlogin = PlayerLogin('UserToken',UserToken)
                if(playerlogin[0]){
                    SaveCookie('UserToken',playerlogin[1], '30');
                    document.getElementById("login").innerHTML = '登录成功，正在返回之前的页面...<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>';
                    clock(document.referrer,5);
            }
            }else{
                playerlogin = [false,"Unlogin"]
            }
            function login(loged){
                if(loged){
                    alert("你已经登陆过了！")
                }else{
                playerlogin = PlayerLogin(document.getElementById("username").value,document.getElementById("password").value)
                if(playerlogin[0]){
                    SaveCookie('UserToken',playerlogin[1],'30')
                    document.getElementById("login").innerHTML = '登录成功，正在返回之前的页面...<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>';
                    clock(document.referrer,5)
                }else{
                    document.getElementById("login").innerHTML = '<PlayerLogin style="color:white;background:#FF0000">登录失败，请重新登录</PlayerLogin><PlayerLogin style="color:white;background:#FF00FF">登录失败原因:' + playerlogin[1] + '</PlayerLogin>';
                    }
                }
            }
        </script>
        <button type="button" onclick="login(playerlogin[0])">登录</button>
