<!DOCTYPE html>
<head>
    <title>登录页面</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <form>
        <a></a>
        <div id="login">

        </div>
        <div>
            <h>请输入玩家名  </h>
        <input onkeyup="value=value.replace(/[\W]/g,'') "onbeforepaste="clipboardData.setData('text',clipboardData.getData('text').replace(/[^\d]/g,''))"
onkeydown="if(event.keyCode==13)event.keyCode=9" id="User">
        </div>
        <div>
            <h>请输入密码    </h>
        <input onkeyup="value=value.replace(/[\W]/g,'') "onbeforepaste="clipboardData.setData('text',clipboardData.getData('text').replace(/[^\d]/g,''))"
onkeydown="if(event.keyCode==13)event.keyCode=9" id="Password">
        </div>
        <time id="time"></time>
        <script src="/js/sha256.js"></script>
        <script src="/js/PlayerLogin.js"></script>
        <script src="/js/ReadVaule.js"></script>
        <script src="/js/cookie.js"></script>
        <script src="/js/clock_jump.js"></script>
        <script type="text/javascript">
            User = ReadCookie('User')
            Password = ReadCookie('Password')
            playerlogin = PlayerLogin(User,Password)
            if(playerlogin[0]){
                SaveCookie('User',User,'30')
                SaveCookie('Password',User,'30')
                document.getElementById("login").innerHTML = '登录成功，正在返回之前的页面...<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>';
                clock(document.referrer,5)
            }
            function login(loged){
                if(loged){
                    alert("你已经登陆过了！")
                }else{
                playerlogin = PlayerLogin(document.getElementById("User").value,document.getElementById("Password").value)
                if(playerlogin[0]){
                    SaveCookie('User',playerlogin[1],'30')
                    SaveCookie('Password',playerlogin[2],'30')
                    document.getElementById("login").innerHTML = '登录成功，正在返回之前的页面...';
                    clock(document.referrer,5)
                }else{
                        document.getElementById("login").innerHTML = '账户或密码错误';
                    }
                }
            }
        </script>
        <button type="button" onclick="login(playerlogin[0])">登录</button>
    </form>
</body>
