<!DOCTYPE html>
<head>
    <title>回答错误</title>
</head>
<boby ondragstart="return false" oncontextmenu="return false" onselectstart="return false">
    <form>
        <b id="text"></b>
        <script language="javascript" type="text/javascript">
            var i=5
            function clock(To){
                i=i-1
                document.title= "页面将在" + i + "内跳转"
                if(i>0){
                    setTimeout("clock()",1000);
                }else{
                    window.open('../' + To + '.html');
                    window.opener = "test";
                    window.close();
                    window.opener=null;
                    window.open('','_self');
                    window.close();
                    window.open("about:blank","_self").close();
                }
            }
            var allcookies = document.cookie;
            function getCookie(cookie_name)
            {
                var allcookies = document.cookie;
                var cookie_pos = allcookies.indexOf(cookie_name);
                // 如果找到了索引，就代表zhicookie存在，
                // 反之，就说明不存在。
                if (cookie_pos != -1){
                    // 把cookie_pos放在值的开始，只要给值加1即可。
                    cookie_pos += cookie_name.length + 1;      //这里容易出问题，所以请大家参考的时候自己好好研究一下
                    var cookie_end = allcookies.indexOf(";", cookie_pos);
          
                    if (cookie_end == -1){
                        cookie_end = allcookies.length;
                    }
                    var value = unescape(allcookies.substring(cookie_pos, cookie_end)); 
                    return value;
                } 
                // 调用函数
            }
            var cookie_val = getCookie("Level1");
            if (cookie_val = 'A'){
                document.title = cookie_val;
                document.getElementById("text").innerHTML = "你选择的是A，但是你为什么要来C页？";
                clock('./Level1-' + cookie_val)
            }else{
                if (cookie_val = 'B'){
                    document.getElementById("text").innerHTML = "你选择的是B，但是你为什么要来C页？";
                    clock('./Level1-' + cookie_val)
                }else{
                    if (cookie_val = 'C'){
                        document.getElementById("text").innerHTML = "正在跳转至下一题...";
                    }else{
                        if (cookie_val = 'D'){
                            document.getElementById("text").innerHTML = "你选择的是D，但是你为什么要来C页？";
                            clock('./Level1-' + cookie_val)
                        }else{
                            document.title = cookie_val;
                        }
                    }
                }
        }
        </script>
    </form>
</boby>
