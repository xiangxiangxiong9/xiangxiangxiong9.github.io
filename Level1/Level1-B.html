<boby> 
    <form>
        <b id="text"></b>
        <script src="/js/NO_RIGHT_MOUSE_KEY.js"></script>
        <script src="/js/NO_CTRL_SHIFT_C_F12.js"></script>
        <script src="/js/cookie-read.js"></script>
        <script src="/js/cookie-save.js"></script>
        <script src="/js/clock_jump.js"></script>
        <script src="/js/NOBACK.js"></script>
        <script language="javascript" type="text/javascript">
            NOBACK();
            var cookie_val = ReadCookie("Level1");
            if (cookie_val = 'A'){
                document.title = cookie_val;
                document.getElementById("text").innerHTML = "你选择的是A，但是你为什么要来B页？";
                document.title = "你走错页面了...qwq"
                clock('./Level1-' + cookie_val)
            }else{
                if (cookie_val = 'B'){
                    document.getElementById("text").innerHTML = "正在跳转至下一题...";
                    document.title = "正在跳转到下一题..."
                    clock('/Level2/Level2')
                }else{
                    if (cookie_val = 'C'){
                        document.getElementById("text").innerHTML = "你选择的是C，但是你为什么要来B页？";
                        document.title = "你走错页面了...qwq"
                        clock('./Level1-' + cookie_val)
                    }else{
                        if (cookie_val = 'D'){
                            document.getElementById("text").innerHTML = "你选择的是D，但是你为什么要来B页？";
                            document.title = "你走错页面了...qwq"
                            clock('./Level1-' + cookie_val)
                        }else{
                            document.title = cookie_val;
                        }
                    }
                }
        }
        </script>
    </form>
