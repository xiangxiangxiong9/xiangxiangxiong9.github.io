<!DOCTYPE html>
<head>
    <title>Level 1</title>
    <script src="/js/NOBACK.js"></script>
</head>
<boby>
    <form>
        <question style="color:red">请问： 你认为以下哪一个是正确的？<br><br><br></question>
        <div align='left' style="position:relative;top:10px">
            <button type="button" onclick="touched('1',Random_A,Did)" id="A"></button>
        </div>
        <div align='left' style="position:relative;top:15px">
            <button type="button" onclick="touched('1',Random_B,Did)" id="B"></button>
        </div>
        <div align='left' style="position:relative;top:20px">
            <button type="button" onclick="touched('1',Random_C,Did)" id="C"></button>
        </div>
        <div align='left' style="position:relative;top:25px">
            <button type="button" onclick="touched('1',Random_D,Did)" id="D"></button>
        </div>
        <time id="time"></time>
        <script src="/js/time.js"></script>
        <a id="text"></a>
        <script src="/js/NO_RIGHT_MOUSE_KEY.js"></script>
        <script src="/js/NO_CTRL_SHIFT_C_F12.js"></script>
        <script src="/js/cookie.js"></script>
        <script src="/js/clock_jump.js"></script>
        <script src="/js/NOBACK.js"></script>
        <script src="/js/random.js"></script>
        <script language="javascript" type="text/javascript">
            Did = check('1');
            NOBACK();
            function Random(Answer1,Answer2,Answer3,Answer4){
                random = random(1,4);
                var touch = {A,B,C,D}
                var Random_A = touch[random[1]];
                var Random_B = touch[random[2]];
                var Random_C = touch[random[3]];
                var Random_D = touch[random[4]];
                document.getElementById(touch[random[1]]).innerHTML = touch[random[1]] + '. ' + Answer1;
                document.getElementById(touch[random[2]]).innerHTML = touch[random[2]] + '. ' + Answer2;
                document.getElementById(touch[random[3]]).innerHTML = touch[random[3]] + '. ' + Answer3;
                document.getElementById(touch[random[4]]).innerHTML = touch[random[4]] + '. ' + Answer4;
            }
            Random("狂人日记》是老舍写的","腐竹Malajis没有正版","Minecraft成立于1978年","以上都不对");
        </script>
    </form>
</boby>
