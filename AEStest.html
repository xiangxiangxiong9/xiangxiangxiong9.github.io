<script type="text/javascript">
	function random(start, end) {
    var length = end - start;
    var myorder = new Array();
    var index = 0;
    while (index < length+1) {
        var flag = true;
        var num = parseInt(start + Math.random() * (end-start+1));
        for (var i in myorder) {
            if (myorder[i] == num) {
                    flag = false;
                }
        }
        if (flag == true) {
            myorder[index] = num;
            index++;
        }
        }
    return myorder;
}
</script>
