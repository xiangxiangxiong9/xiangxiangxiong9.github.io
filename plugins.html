<!DOCTYPE html>
<head>
    <title>服务器插件列表</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <form>
        <a></a>
        <div id="plugins">

        </div>
        <time id="time"></time>
        <script src="/js/加密.js"></script>
        <script src="/js/plugins.js"></script>
        <script src="/js/PlayerLogin.js"></script>
        <script src="/js/ReadVaule.js"></script>
        <script src="/js/cookie.js"></script>
        <script src="/js/clock_jump.js"></script>
        <script type="text/javascript">
            User = ReadCookie('User')
            Password = ReadCookie('Password')
            if(User == '' || Password == ''){
                document.getElementById("plugins").innerHTML = '请先登录';
                clock('/PlayerLogin',5)
            }else{
                playerlogin = PlayerLogin(User,Password)
                if(!playerlogin[0]){
                    document.getElementById("plugins").innerHTML = '登录失败，请重新登录';
                    clock('/PlayerLogin',5)
                }else{
                    ShowPlugins(User,Password)
                }
            }
        </script>
    </form>
</body>
