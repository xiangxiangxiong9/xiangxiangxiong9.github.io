<head>

<body>
    <form>
        <a></a>
        <div id="plugins">

        </div>
        <time id="time"></time>
        <script src="/js/crypto-js.js"></script>
        <script src="/js/AES.js"></script>
        <script src="/js/plugins.js"></script>

        <script src="/js/ReadVaule.js"></script>
        <script src="/js/cookie.js"></script>
        <script src="/js/clock_jump.js"></script>
        <script type="text/javascript">
            UserToken = ReadCookie('UserToken')
            if(UserToken != ''){
                playerlogin = PlayerLogin('UserToken',UserToken)
                if(!playerlogin[0]){
                    document.getElementById("plugins").innerHTML = '登录失败，请重新登录<br>登录失败原因:' + playerlogin[1];
                    clock('/PlayerLogin',5)
                }else{
                    ShowPlugins(User,Password)
                }
            }else{
                document.getElementById("plugins").innerHTML = '登录失败，请重新登录<br>登录失败原因: 没有登录过或数据已过期';
                        clock('/PlayerLogin',5)
                } 
        </script>
    </form>
</body>
